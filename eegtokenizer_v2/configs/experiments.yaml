    train_ratio: 0.7
    val_ratio: 0.15
    normalization: "z_score"
    batch_size: 32
    num_workers: 0

  training:
    epochs: 100
    optimizer:
      name: "Adam"
      lr:  冗0.001
    scheduler:
      name: "CosineAnnealingLR"
